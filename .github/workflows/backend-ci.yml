name: Backend CI

on:
  pull_request:
    paths:
      - "aspnet-core/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "aspnet-core/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aspnet-core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('aspnet-core/**/*.csproj', 'aspnet-core/**/*.props', 'aspnet-core/**/*.targets', 'aspnet-core/NuGet.Config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AstraLab.sln

      - name: Build
        run: dotnet build AstraLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AstraLab.sln --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: aspnet-core/TestResults/**/*.trx
          if-no-files-found: ignore
