version: '3'

services:

  abp_host:
    image: abp/host
    environment:
      ASPNETCORE_ENVIRONMENT: "Staging"
      ConnectionStrings__Default: "Server=10.0.75.1; Database=AstraLabDb; User=AstraLabUser; Password=YourStrongPassword;TrustServerCertificate=True;"
      App__ServerRootAddress: "http://localhost:44311/"
      App__ClientRootAddress: "http://localhost:4200/"
      App__CorsOrigins: "http://localhost:4200"
      DatasetStorage__DefaultProvider: "s3-compatible"
      DatasetStorage__RawRootPath: "/app/App_Data/Datasets/Raw"
      MLExecution__ExecutorBaseUrl: "http://ml_executor:8010"
      MLExecution__CallbackBaseUrl: "http://abp_host"
      MLExecution__SharedSecret: "AstraLab_ML_Executor_SharedSecret_2026"
      MLExecution__DefaultArtifactStorageProvider: "s3-compatible"
      MLExecution__ArtifactRootPath: "/app/App_Data/MLArtifacts"
      ObjectStorage__ServiceUrl: "http://minio:9000"
      ObjectStorage__Region: "us-east-1"
      ObjectStorage__AccessKey: "minioadmin"
      ObjectStorage__SecretKey: "minioadmin"
      ObjectStorage__ForcePathStyle: "true"
      ObjectStorage__DatasetBucketName: "astralab-datasets"
      ObjectStorage__DatasetKeyPrefix: "datasets"
      ObjectStorage__MlArtifactBucketName: "astralab-ml-artifacts"
      ObjectStorage__MlArtifactKeyPrefix: "ml-artifacts"
      ObjectStorage__PresignedUrlTtlSeconds: "900"
      TZ: "America/Toronto"
      Kestrel__Endpoints__Http__Url: "http://+:80"
    ports:
      - "44311:80"
    volumes:
      - "./Host-Logs:/app/App_Data/Logs"
    restart: always

  abp_ng:
    image: abp/ng
    ports:
      - "4200:80"

  ml_executor:
    build:
      context: ../../../ml-executor
      dockerfile: Dockerfile
    environment:
      ML_EXECUTOR_SHARED_SECRET: "AstraLab_ML_Executor_SharedSecret_2026"
      ML_EXECUTOR_HTTP_TIMEOUT_SECONDS: "30"
      TZ: "America/Toronto"
    ports:
      - "8010:8010"
    restart: always

  minio:
    image: minio/minio:RELEASE.2026-03-12T18-04-18Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - "minio_data:/data"
    restart: always

  minio_setup:
    image: minio/mc:RELEASE.2026-03-13T08-21-43Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 2; done &&
      /usr/bin/mc mb --ignore-existing local/astralab-datasets &&
      /usr/bin/mc mb --ignore-existing local/astralab-ml-artifacts
      "

volumes:
  minio_data:
